spring:
  datasource:
    url: jdbc:postgresql://postgresql:5432/product
    username: root
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    baseline-on-migrate: true
    enabled: true
    locations: classpath:db/migration
server:
  port: 8063



eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://discovery-service:8761/eureka}

management:
  server:
    port: 7079

  endpoints:
    web:
      exposure:
        include: "health, info, metrics, prometheus"


  endpoint:
    health:
      show-components: when_authorized
      probes:
        enabled: true
      access: read_only
  info:
    env:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}


info:
  app:
    name: ${spring.application.name}
    description: Product Service for microservices system Observability
    version: 1.0.0
    owner: Hussein Abo Noktah