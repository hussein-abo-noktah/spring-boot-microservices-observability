spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: customer-service
              uri: lb://CUSTOMER-SERVICE
              predicates:
                - Path=/api/v1/customers/**

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/v1/orders/**

            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/api/v1/payments/**

            - id: product-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/v1/products/**
server:
  port: 8333

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://discovery-service:8761/eureka/}


management:
  server:
    port: 7071

  endpoints:
    web:
      exposure:
        include: "health, info, metrics, prometheus"


  endpoint:
    health:
      show-components: when_authorized
      probes:
        enabled: true
      access: read_only
  info:
    env:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}


info:
  app:
    name: ${spring.application.name}
    description: Gateway Service for microservices system Observability
    version: 1.0.0
    owner: Hussein Abo Noktah