groups:
  - name: spring-boot-microservices-alerts
    rules:

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "Target {{ $labels.job }} on {{ $labels.instance }} is down for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          sum by (application) (
            rate(http_server_requests_seconds_count{status=~"5.."}[5m])
          )
          /
          sum by (application) (
            rate(http_server_requests_seconds_count[5m])
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate"
          description: "{{ $labels.application }} has more than 5% 5xx errors for 2 minutes."

      - alert: HighResponseTime
        expr: |
          (
            sum by (application) (
              rate(http_server_requests_seconds_sum[5m])
            )
            /
            sum by (application) (
              rate(http_server_requests_seconds_count[5m])
            )
          ) > 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High average response time"
          description: "{{ $labels.application }} average response time is above 1 second for 3 minutes."

      - alert: HighJvmMemoryUsage
        expr: |
          sum by (application) (
            jvm_memory_used_bytes{area="heap"}
          )
          /
          sum by (application) (
            jvm_memory_max_bytes{area="heap"}
          ) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High JVM heap memory usage"
          description: "{{ $labels.application }} JVM heap memory usage is above 85% for 5 minutes."

      - alert: HighCpuUsage
        expr: |
          process_cpu_usage > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High process CPU usage"
          description: "{{ $labels.application }} process CPU usage is above 85% for 5 minutes."

      - alert: TooManySlowRequests
        expr: |
          sum by (application) (
            rate(http_server_requests_seconds_count{outcome="SERVER_ERROR"}[5m])
          ) > 5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Too many server errors"
          description: "{{ $labels.application }} has many server error requests."