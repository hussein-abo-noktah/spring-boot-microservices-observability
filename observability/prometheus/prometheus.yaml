global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Prometheus and the Spring services run as Docker containers on the same network.
# Use Docker service names so Prometheus can reach each actuator endpoint.
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          application: "prometheus"

  - job_name: "gateway-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["gateway-service:7071"]
        labels:
          application: "gateway-service"

  - job_name: "customer-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["customer-service:7073"]
        labels:
          application: "customer-service"


  - job_name: "order-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["order-service:7075"]
        labels:
          application: "order-service"



  - job_name: "payment-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["payment-service:7077"]
        labels:
          application: "payment-service"


  - job_name: "product-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: [ "product-service:7079" ]
        labels:
          application: "product-service"
