global:
  resolve_timeout: 5m

route:
  receiver: default-webhook
  group_by: ['alertname', 'application', 'severity']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h

receivers:
  - name: default-webhook
    webhook_configs:
      - url: 'http://host.docker.internal:5001/alerts'
        send_resolved: true