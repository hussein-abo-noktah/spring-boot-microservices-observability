services:
  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus_container
    ports:
      - "9090:9090"
    volumes:
      - ./../observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

    depends_on:
      - gateway-service
      - order-service
      - customer-service
      - payment-service
      - product-service
    networks:
      - microservices-observability-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:main-distroless-slim
    container_name: grafana_container
    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./../observability/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - microservices-observability-net
    restart: unless-stopped


  tempo:
    image: grafana/tempo:latest
    container_name: tempo_container
    command: [ "-config.file=/etc/tempo.yml" ]
    ports:
      - "3200:3200"
    volumes:
      - ./../observability/tempo/tempo.yml:/etc/tempo.yml
      - tempo_data:/var/tempo
    networks:
      - microservices-observability-net
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki_container
    command: [ "-config.file=/etc/loki/loki.yml" ]
    ports:
      - "3100:3100"
    volumes:
      - ./../observability/loki/loki.yml:/etc/loki/loki.yml
      - loki_data:/loki
    networks:
      - microservices-observability-net
    restart: unless-stopped


  alloy:
    image: grafana/alloy:latest
    container_name: alloy_container
    command:
      - run
      - /etc/config.alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "4317:4317"
      - "4318:4318"
      - "12345:12345"
    volumes:
      - ./../observability/alloy/config.alloy:/etc/config.alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
      - tempo
    networks:
      - microservices-observability-net
    restart: unless-stopped
