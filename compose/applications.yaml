services:

  config-server:
    container_name: ms_config-server
    build:
      context: ./../services/config-server
      dockerfile: ../../docker/config/Dockerfile
    restart: unless-stopped
    ports:
      - "8888:8888"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - microservices-observability-net

  discovery-service:
    container_name: ms_discovery-service
    build:
      context: ./../services/discovery
      dockerfile: ../../docker/discovery/Dockerfile
    restart: unless-stopped
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - microservices-observability-net

  gateway-service:
    container_name: ms_gateway-service
    build:
      context: ./../services/gateway
      dockerfile: ../../docker/gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "8333:8333"
      - "7071:7071"
    depends_on:
      config-server:
        condition: service_healthy

      discovery-service:
        condition: service_started

    networks:
      - microservices-observability-net


  customer-service:
    container_name: ms_customer-service
    build:
      context: ./../services/customer
      dockerfile: ../../docker/customer/Dockerfile
    restart: unless-stopped
    ports:
      - "8090:8090"
      - "7073:7073"
    depends_on:
      config-server:
        condition: service_healthy
      mongodb:
        condition: service_started
      discovery-service:
        condition: service_started
    networks:
      - microservices-observability-net

  product-service:
    container_name: ms_product-service
    build:
      context: ./../services/product
      dockerfile: ../../docker/product/Dockerfile
    restart: unless-stopped
    ports:
      - "8063:8063"
      - "7079:7079"
    depends_on:
      config-server:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - microservices-observability-net


  order-service:
    container_name: ms_order-service
    build:
      context: ./../services/order
      dockerfile: ../../docker/order/Dockerfile
    restart: unless-stopped
    ports:
      - "8070:8070"
      - "7075:7075"
    depends_on:
      config-server:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      discovery-service:
        condition: service_started
    networks:
      - microservices-observability-net

  payment-service:
    container_name: ms_payment-service
    build:
      context: ./../services/payment
      dockerfile: ../../docker/payment/Dockerfile
    restart: unless-stopped
    ports:
      - "8092:8092"
      - "7077:7077"
    depends_on:
      config-server:
        condition: service_healthy
      postgresql:
        condition: service_started
      discovery-service:
        condition: service_started
    networks:
      - microservices-observability-net

